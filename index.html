<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Helper - Download</title>
    <style>
        /* CSS সরাসরি এখানে দেওয়া হলো যাতে কোনো লিঙ্কিং সমস্যা না থাকে */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .minimal {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #2d3436;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00b894;
            color: white;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.3);
        }

        .download-btn:hover {
            background: #00a082;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        .btn-icon {
            margin-right: 12px;
            font-size: 1.4rem;
        }

        .meta {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #b2bec3;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #636e72;
            background: #f1f2f6;
            padding: 12px;
            border-radius: 10px;
            line-height: 1.4;
            border-left: 4px solid #00b894;
        }
    </style>
</head>
<body>

    <main class="minimal">
        <h1>Daily Helper</h1>
        <p class="subtitle">দৈনন্দিন কাজের দ্রুত ও সহজ সমাধান</p>

        <a class="download-btn" href="https://drive.google.com/uc?export=download&id=1yjITFnnBVKu9yPih52DFAvdUbLNtXVzH" target="_blank" rel="noopener">
            <span class="btn-icon">⬇️</span>
            <span class="btn-text">APK ডাউনলোড করুন</span>
        </a>

        <p class="meta">Android APK — 4.9 MB</p>
        <p class="note">
            <strong>Note:</strong> If Google Drive shows a "can't scan this file" warning, choose <b>"Download anyway"</b>.
        </p>
    </main>

</body>
</html>
